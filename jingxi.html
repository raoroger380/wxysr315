<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐</title>
    <style>
        :root {
            --accent-rgb: 59, 130, 246;
            --bg: #ece6e0;
            --glass: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(var(--accent-rgb), 0.12);
            --glass-hover: rgba(var(--accent-rgb), 0.06);
            --accent: #3b82f6;
            --accent-soft: rgba(var(--accent-rgb), 0.08);
            --accent-glow: rgba(var(--accent-rgb), 0.1);
            --text: #1e293b;
            --text-secondary: #64748b;
            --radius: 16px;
            --radius-lg: 24px;
            --text-muted: #475569;
            --switch-bg: rgba(255,255,255,0.65);
            --switch-border: rgba(0,0,0,0.08);
            --switch-shadow: rgba(0,0,0,0.06);
            --grad-end-light: #60a5fa;
            --grad-end-dark: #2563eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            margin: 0; padding: 0; overflow: hidden;
            background: var(--bg);
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica', 'Arial', sans-serif;
            height: 100vh; width: 100vw;
            position: relative;
            cursor: default; user-select: none; -webkit-user-select: none;
            background:
                radial-gradient(ellipse at 50% 40%, rgba(var(--accent-rgb), 0.04) 0%, transparent 60%),
                var(--bg);
        }

        .control-panel {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            text-align: center;
            width: 88%; max-width: 400px;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(var(--accent-rgb), 0.12);
            border-radius: var(--radius-lg);
            padding: 34px 28px;
            box-shadow: 0 20px 60px rgba(var(--accent-rgb), 0.08), 0 0 40px var(--accent-glow);
            display: flex; flex-direction: column; align-items: center;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 1; scale: 1;
            animation: floatPanel 3.5s ease-in-out infinite, panelFadeIn 0.6s forwards;
        }
        @keyframes panelFadeIn {
            from { scale: 0.85; opacity: 0; }
            to { scale: 1; opacity: 1; }
        }
        @keyframes floatPanel {
            0%, 100% { transform: translate(-50%, -50%) translateY(0px); }
            50% { transform: translate(-50%, -50%) translateY(-10px); }
        }

        .control-title {
            font-size: 28px; font-weight: 400;
            margin-bottom: 18px;
            color: var(--accent);
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(var(--accent-rgb), 0.2);
        }
        .control-message {
            font-size: 15px; color: var(--text-secondary);
            margin-bottom: 26px; line-height: 1.7;
            font-weight: 300; letter-spacing: 0.5px;
        }
        .control-button {
            padding: 14px 38px;
            font-size: 17px; font-weight: 400;
            color: var(--accent);
            background: rgba(var(--accent-rgb), 0.06);
            border: 1px solid rgba(var(--accent-rgb), 0.15);
            border-radius: 30px;
            cursor: pointer;
            letter-spacing: 2px;
            font-family: inherit;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(var(--accent-rgb), 0.05);
        }
        .control-button:hover {
            background: rgba(var(--accent-rgb), 0.1);
            border-color: rgba(var(--accent-rgb), 0.3);
            box-shadow: 0 0 30px var(--accent-glow);
            transform: translateY(-2px);
        }
        .control-button:active {
            transform: translateY(1px);
            transition: all 0.08s ease;
        }
        .hidden { display: none !important; }

        .popup {
            position: absolute;
            display: flex; justify-content: center; align-items: center;
            border-radius: var(--radius);
            padding: 16px 14px;
            box-sizing: border-box;
            opacity: 0;
            transform: scale(0.75);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            cursor: default; user-select: none;
            max-width: 240px;
            text-align: center;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            font-weight: 400;
            letter-spacing: 0.6px;
            border: 1px solid;
        }

        .heart-popup {
            position: absolute;
            display: flex; justify-content: center; align-items: center;
            border-radius: 10px;
            padding: 8px 6px;
            box-sizing: border-box;
            opacity: 0;
            transition: transform 0.32s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.28s ease-out, box-shadow 0.28s ease-out;
            z-index: 1001;
            cursor: default; user-select: none;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            font-size: 10.5px !important;
            font-weight: 500;
            transform: translate3d(0, 10px, 0) scale(0.72);
            min-width: 75px; min-height: 38px; max-width: 105px;
            word-wrap: break-word; white-space: normal;
            line-height: 1.35; text-align: center;
            letter-spacing: 0.3px;
            will-change: transform, opacity;
        }
        .heart-popup.is-visible {
            opacity: 1;
            transform: translate3d(0, 0, 0) scale(0.96);
        }
        .heart-popup.is-exit {
            opacity: 0;
            transform: translate3d(0, -8px, 0) scale(0.82);
        }

        #fireworkCanvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 9997;
            display: none;
        }
        #fireworkCanvas.active { display: block; }

        /* 祝福贺卡 */
        .bless-card {
            position: fixed; left: 50%; bottom: -280px;
            transform: translateX(-50%);
            width: 88%; max-width: 340px;
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(var(--accent-rgb),0.15);
            border-radius: var(--radius-lg);
            padding: 28px 24px;
            z-index: 9998;
            box-shadow: 0 20px 60px rgba(var(--accent-rgb),0.1);
            transition: bottom 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
        }
        .bless-card.show {
            bottom: auto; top: 50%;
            transform: translate(-50%, -50%);
        }
        .bless-card .card-emoji { font-size: 2rem; margin-bottom: 6px; }
        .bless-card .card-name {
            font-size: 1.2rem; color: var(--accent);
            font-weight: 400; letter-spacing: 2px;
        }
        .bless-card .card-divider {
            width: 36px; height: 2px;
            background: var(--accent); opacity: 0.25;
            margin: 10px auto;
        }
        .bless-card .card-msg {
            font-size: 0.88rem; color: var(--text-secondary);
            line-height: 1.9; margin-bottom: 20px;
        }
        .bless-card .card-msg strong { color: var(--accent); font-weight: 500; }
        .save-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 11px 26px;
            background: linear-gradient(135deg, var(--accent), var(--grad-end-dark));
            color: #fff; border: none;
            border-radius: 30px;
            font-size: 0.9rem; font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(var(--accent-rgb),0.3);
        }
        .save-btn:active { transform: translateY(1px); }
        @media (max-width: 600px) {
            .bless-card { padding: 22px 18px; }
            .bless-card .card-name { font-size: 1.1rem; }
        }

        .screen-flash {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 9996;
            background: radial-gradient(circle, rgba(var(--accent-rgb), 0.15) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.08s ease-out;
            display: none;
        }

        /* 留言板弹窗 */
        .msg-overlay {
            position: fixed; inset: 0; z-index: 99999;
            background: rgba(0,0,0,0.12);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: none;
            justify-content: center; align-items: center;
            padding: 20px;
        }
        .msg-overlay.show { display: flex; }
        .msg-modal {
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(var(--accent-rgb),0.15);
            border-radius: var(--radius-lg);
            padding: 28px 24px;
            width: 88%; max-width: 420px;
            max-height: 80vh;
            box-shadow: 0 24px 80px rgba(var(--accent-rgb),0.15);
            display: flex; flex-direction: column;
            animation: modalIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes modalIn {
            0% { transform: scale(0.85); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .msg-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px;
        }
        .msg-title { font-size: 1.2rem; color: var(--accent); letter-spacing: 2px; }
        .msg-close {
            font-size: 1.6rem; color: var(--text-secondary); cursor: pointer;
            padding: 0 8px; line-height: 1;
            transition: color 0.2s; touch-action: manipulation;
        }
        .msg-close:hover { color: var(--text); }
        .msg-body { overflow-y: auto; flex: 1; }
        .msg-input, .msg-textarea {
            width: 100%; padding: 12px 14px;
            border: 1px solid rgba(var(--accent-rgb),0.15);
            border-radius: var(--radius-sm);
            font-size: 0.9rem; font-family: inherit;
            background: rgba(255,255,255,0.6);
            color: var(--text); outline: none;
            transition: border-color 0.3s;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        .msg-input:focus, .msg-textarea:focus { border-color: var(--accent); }
        .msg-textarea { min-height: 80px; resize: vertical; }
        .msg-submit {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, var(--accent), var(--grad-end-dark));
            color: #fff; border: none;
            border-radius: var(--radius-sm);
            font-size: 0.95rem; font-family: inherit;
            cursor: pointer; letter-spacing: 1px;
            transition: all 0.3s;
            margin-bottom: 20px;
            touch-action: manipulation;
        }
        .msg-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(var(--accent-rgb),0.3); }
        .msg-submit:active { transform: translateY(1px); }
        .msg-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .msg-list-title {
            font-size: 0.82rem; color: var(--text-secondary);
            margin-bottom: 10px; text-align: left; letter-spacing: 0.5px;
        }
        .msg-items { max-height: 200px; overflow-y: auto; }
        .msg-item {
            padding: 10px 12px;
            background: rgba(255,255,255,0.5);
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            text-align: left;
            font-size: 0.85rem;
            border: 1px solid rgba(var(--accent-rgb),0.08);
        }
        .msg-item .msg-item-name {
            font-weight: 500; color: var(--accent); font-size: 0.78rem;
        }
        .msg-item .msg-item-text {
            color: var(--text); line-height: 1.5; margin-top: 2px;
        }
        .msg-item .msg-item-time {
            font-size: 0.68rem; color: var(--text-secondary); opacity: 0.5;
            margin-top: 4px;
        }
        .msg-empty {
            text-align: center; color: var(--text-secondary);
            font-size: 0.85rem; padding: 20px 0; opacity: 0.6;
        }
        .msg-toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            color: #fff; padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-size: 0.9rem; z-index: 100000;
            pointer-events: none;
            animation: toastFade 2s ease forwards;
        }
        @keyframes toastFade {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
        }
        .msg-btn {
            display: inline-block; margin-top: 12px;
            padding: 8px 20px;
            background: rgba(var(--accent-rgb),0.06);
            border: 1px solid rgba(var(--accent-rgb),0.15);
            border-radius: 30px;
            color: var(--accent); font-size: 0.85rem;
            cursor: pointer; font-family: inherit;
            transition: all 0.3s; touch-action: manipulation;
        }
        .msg-btn:hover {
            background: rgba(var(--accent-rgb),0.1);
            border-color: rgba(var(--accent-rgb),0.3);
        }

        @media (max-width: 480px) {
            .msg-modal { padding: 20px 16px; max-height: 85vh; }
            .msg-textarea { min-height: 64px; }
            .msg-items { max-height: 150px; }
        }

        /* 下一个按钮 */
        .next-btn {
            display: inline-block; margin-top: 8px;
            padding: 8px 20px;
            background: rgba(236,72,153,0.08);
            border: 1px solid rgba(236,72,153,0.2);
            border-radius: 30px;
            color: #ec4899; font-size: 0.85rem;
            cursor: pointer; font-family: inherit;
            transition: all 0.3s; touch-action: manipulation;
        }
        .next-btn:hover {
            background: rgba(236,72,153,0.12);
            border-color: rgba(236,72,153,0.35);
        }

        /* 二维码弹窗 */
        .qrcode-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .qrcode-overlay.show {
            opacity: 1; pointer-events: auto;
        }
        .qrcode-modal {
            background: #fff; border-radius: 20px;
            padding: 40px 36px 30px;
            text-align: center;
            box-shadow: 0 24px 80px rgba(0,0,0,0.2);
            max-width: 320px; width: 85%;
            transform: scale(0.9); transition: transform 0.3s ease;
        }
        .qrcode-overlay.show .qrcode-modal {
            transform: scale(1);
        }
        .qrcode-modal img {
            width: 180px; height: 180px;
            border-radius: 12px; margin-bottom: 16px;
            display: block; margin-left: auto; margin-right: auto;
        }
        .qrcode-modal .qrcode-title {
            font-size: 1.1rem; color: #1e293b;
            font-weight: 500; margin-bottom: 6px;
        }
        .qrcode-modal .qrcode-sub {
            font-size: 0.85rem; color: #94a3b8; margin-bottom: 16px;
        }
        .qrcode-close {
            display: inline-block; padding: 6px 22px;
            background: rgba(var(--accent-rgb),0.06);
            border: 1px solid rgba(var(--accent-rgb),0.12);
            border-radius: 30px; color: #64748b;
            font-size: 0.8rem; cursor: pointer;
            font-family: inherit; transition: all 0.3s;
        }
        .qrcode-close:hover {
            background: rgba(var(--accent-rgb),0.1);
        }

        /* ===== 暗色主题 ===== */
        body.dark {
            --accent-rgb: 180, 180, 200;
            --accent: #b4b4c8;
            --bg: #080808;
            --glass: rgba(25, 25, 35, 0.7);
            --glass-border: rgba(180, 180, 200, 0.15);
            --glass-hover: rgba(180, 180, 200, 0.06);
            --accent-soft: rgba(180, 180, 200, 0.1);
            --accent-glow: rgba(180, 180, 200, 0.12);
            --text: #f0f0f5;
            --text-muted: #b0b0c0;
            --text-secondary: #9090a0;
            --switch-bg: rgba(30, 30, 40, 0.8);
            --switch-border: rgba(255,255,255,0.12);
            --switch-shadow: rgba(0,0,0,0.4);
            --grad-end-light: #d0d0dc;
            --grad-end-dark: #a0a0b4;
            background: #080808;
        }
        body.dark [class*="card"], body.dark [class*="popup"], body.dark [class*="modal"],
        body.dark [class*="overlay"], body.dark [class*="wrap"], body.dark [class*="panel"] {
            background-color: rgba(25, 25, 35, 0.75) !important; }
        body.dark input, body.dark textarea { color: #f0f0f5 !important; }
        body.dark ::placeholder { color: #707080 !important; }
        body.dark small, body.dark [class*="muted"], body.dark [class*="hint"] { color: #a0a0b0 !important; }

        /* 主题切换按钮 */
        .theme-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 100001;
            display: flex; align-items: center; gap: 8px;
            background: var(--switch-bg);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--switch-border);
            box-shadow: 0 2px 12px var(--switch-shadow);
            border-radius: 28px; padding: 4px 6px 4px 14px;
            cursor: pointer; user-select: none; -webkit-user-select: none;
            transition: background 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
        }
        .theme-toggle:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.1); }
        .theme-toggle .theme-label {
            font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap;
            transition: color 0.35s ease; pointer-events: none;
        }
        .theme-toggle .theme-knob-wrapper {
            width: 48px; height: 26px; border-radius: 13px;
            background: #e2e8f0; position: relative; flex-shrink: 0;
            transition: background 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.dark .theme-toggle .theme-knob-wrapper { background: #334155; }
        .theme-toggle .theme-knob {
            position: absolute; top: 3px; left: 3px; width: 20px; height: 20px;
            border-radius: 50%; background: #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.dark .theme-toggle .theme-knob { transform: translateX(22px); }
        .theme-toggle .theme-icon {
            position: absolute; top: 50%; transform: translateY(-50%);
            font-size: 12px; line-height: 1; transition: opacity 0.25s ease; pointer-events: none;
        }
        .theme-toggle .theme-icon.sun { left: 5px; opacity: 1; }
        .theme-toggle .theme-icon.moon { right: 5px; opacity: 0.3; }
        body.dark .theme-toggle .theme-icon.sun { opacity: 0.3; }
        body.dark .theme-toggle .theme-icon.moon { opacity: 1; }
    </style>
</head>
<body>
    <div class="theme-toggle" id="themeToggle" title="切换主题">
        <span class="theme-label" id="themeLabel">浅色</span>
        <div class="theme-knob-wrapper"><span class="theme-icon sun">☀️</span><span class="theme-icon moon">🌙</span><div class="theme-knob"></div></div>
    </div>

    <div id="controlPanel" class="control-panel">
        <div class="control-title">生日快乐</div>
        <div class="control-message">
            点击下方按钮<br>
            收获满满的生日祝福与惊喜
        </div>
        <button id="startButton" class="control-button">开启祝福</button>
    </div>

    <div class="screen-flash" id="screenFlash"></div>
    <canvas id="fireworkCanvas"></canvas>

    <div class="bless-card" id="blessCard">
        <div class="card-emoji">🎂</div>
        <div class="card-name">机长 · 伍希彦生日快乐</div>
        <div class="card-divider"></div>
        <div class="card-msg" id="cardStats"></div>
        <button class="save-btn" id="saveBtn">📷 保存图片</button>
        <button class="next-btn" id="nextBtn">下一个 ➜</button>
        <button class="msg-btn" id="msgBtn">💬 留言</button>
    </div>

    <!-- 二维码弹窗 -->
    <div class="qrcode-overlay" id="qrcodeOverlay">
        <div class="qrcode-modal">
            <img src="qrcode.png" alt="收款码" id="qrCodeImg">
            <div class="qrcode-title">🧋 请你喝奶茶</div>
            <div class="qrcode-sub">扫码领取 10 元红包 🧧</div>
            <div class="qrcode-close" id="qrClose">关闭</div>
        </div>
    </div>

    <!-- 留言板弹窗 -->
    <div id="messageOverlay" class="msg-overlay">
        <div class="msg-modal">
            <div class="msg-header">
                <span class="msg-title">💬 留言板</span>
                <span class="msg-close" id="msgClose">&times;</span>
            </div>
            <div class="msg-body">
                <div class="msg-form">
                    <input type="text" id="msgName" placeholder="你的名字（选填）" class="msg-input" maxlength="20">
                    <textarea id="msgContent" placeholder="写下你的祝福..." class="msg-textarea" maxlength="200"></textarea>
                    <button id="msgSubmit" class="msg-submit">发送祝福 ✨</button>
                </div>
                <div class="msg-list" id="msgList">
                    <div class="msg-list-title">已有祝福</div>
                    <div class="msg-items" id="msgItems">
                        <div class="msg-empty" id="msgEmpty">加载中...</div>
                    </div>
                </div>
                <div style="text-align:center;margin-top:6px;">
                    <span id="adminEntry" style="font-size:0.65rem;color:var(--text-secondary);opacity:0.2;cursor:pointer;transition:opacity 0.3s;touch-action:manipulation;" title="管理入口">⚙️</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const compactDevice = window.innerWidth < 768;
            const lowPowerDevice = (navigator.hardwareConcurrency || 4) <= 4;
            const config = {
                popupCount: 30,
                heartPopupCount: compactDevice ? 80 : (lowPowerDevice ? 90 : 110),
                heartScale: compactDevice ? 17 : 20,
                popupWidth: 225,
                popupHeight: 82,
                heartPopupWidth: compactDevice ? 76 : 82,
                heartPopupHeight: 10,
                baseInterval: 0.18,
                minInterval: 0.04,
                popupDelayAfterHeart: compactDevice ? 650 : 820,
                popupDisplayTime: 5000,

            function heartCurve(t, scale) {
                t = t * 2 * Math.PI;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                return { x: x * scale, y: y * scale };
            }

            let activePopups = [];
            let popupQueue = [];
            let isProcessing = false;

            function createPopup() {
                if (popupQueue.length === 0) {
                    isProcessing = false;
                    checkAllPopupsGone();
                    return;
                }
                const tip = popupQueue.shift();
                const popup = document.createElement('div');
                popup.className = 'popup';

                const y = Math.random() * (window.innerHeight - config.popupHeight - 30) + 15;

                const fontCfg = availableFonts[Math.floor(Math.random() * availableFonts.length)];

                popup.style.width = config.popupWidth + 'px';

                popup.style.fontFamily = fontCfg.family;
                popup.style.fontSize = fontCfg.size;
                popup.style.fontWeight = fontCfg.weight;
                popup.textContent = tip;

                document.body.appendChild(popup);
                activePopups.push(popup);

                requestAnimationFrame(() => {
                    popup.style.opacity = '0.95';
                    popup.style.transform = 'scale(1)';
                });

                setTimeout(() => {
                    if (popup.parentNode) {
                        popup.style.opacity = '0';
                        popup.style.transform = 'scale(0.75)';
                        setTimeout(() => {
                            if (popup.parentNode) {
                                popup.parentNode.removeChild(popup);
                                activePopups = activePopups.filter(p => p !== popup);
                                checkAllPopupsGone();
                            }
                        }, 500);
                    }
                }, config.popupDisplayTime);

                const nextDelay = config.baseInterval * 1000 * (0.7 + Math.random() * 0.6);
                setTimeout(createPopup, nextDelay);
            }

            function checkAllPopupsGone() {
                if (!allPopupsDone && activePopups.length === 0 && popupQueue.length === 0 && !isProcessing &&

            function createHeartPopups() {
                const centerX = window.innerWidth / 2;

                function createPoint(i) {
                    if (i >= config.heartPopupCount) {
                        const checkInterval = setInterval(() => {
                            if (activeHeartPopups === 0) {
                                clearInterval(checkInterval);
                                preparePopupQueue();
                                setTimeout(createPopup, config.popupDelayAfterHeart);
                            }
                        }, 120);

                    }
                    const t = i / config.heartPopupCount;

                    const x = centerX + point.x - config.heartPopupWidth / 2;

                                    activeHeartPopups--;
                                    if (activeHeartPopups === 0 && activePopups.length === 0 && popupQueue.length === 0 && !isProcessing && allPopupsDone) {
                                        checkAllPopupsGone();
                                    }
                                }
                            }, 450);
                        }
                    }, displayTime);

                    setTimeout(() => createPoint(i + 1), compactDevice ? 26 : 22);
                }
                createPoint(0);

            function preparePopupQueue() {
                const shuffled = [...birthdayTips].sort(() => Math.random() - 0.5);
                popupQueue = shuffled.slice(0, config.popupCount);
                isProcessing = false;

            const canvas = document.getElementById('fireworkCanvas');
            const ctx = canvas.getContext('2d');
            const screenFlash = document.getElementById('screenFlash');
            let fwParticles = [];
            let fwRockets = [];
            let fwSparkles = [];
            let fwRunning = false;
            let fwStartTime = 0;
            let fwLastLaunchTime = 0;
            let fwLaunchCount = 0;
            let fwHeartLaunched = false;
            let fwPhase = 0;
            let canvasW, canvasH;

            function resizeCanvas() {
                canvasW = window.innerWidth;
                canvasH = window.innerHeight;
                canvas.width = canvasW;
                canvas.height = canvasH;
            }
            resizeCanvas();
            window.addEventListener('resize', () => {
                resizeCanvas();

            function fireworkColors() {
                const palettes = [
                    ['#3b82f6', '#60a5fa', '#93c5fd', '#2563eb', '#7cb8ff'],
                    ['#2563eb', '#3b82f6', '#60a5fa', '#1d4ed8', '#93c5fd'],
                    ['#3b82f6', '#7cb8ff', '#2563eb', '#a5c8ff', '#1d4ed8'],
                    ['#60a5fa', '#3b82f6', '#93c5fd', '#2563eb', '#7cb8ff'],
                    ['#3b82f6', '#1d4ed8', '#93c5fd', '#2563eb', '#60a5fa'],
                    ['#2563eb', '#60a5fa', '#1d4ed8', '#93c5fd', '#3b82f6'],
                ];
                return palettes[Math.floor(Math.random() * palettes.length)];
            }

            function createRocket() {
                const launchX = canvasW * (0.15 + Math.random() * 0.7);
                const targetY = canvasH * (0.18 + Math.random() * 0.38);
                const colors = fireworkColors();
                const isHeart = !fwHeartLaunched && fwLaunchCount >= 28 && fwPhase >= 2;
                if (isHeart) fwHeartLaunched = true;

                return {
                    x: launchX,
                    y: canvasH + 15,
                    targetY: targetY,
                    speed: 7 + Math.random() * 8,
                    colors: colors,
                    isHeart: isHeart,
                    trailParticles: [],
                    exploded: false,
                    explosionSize: isHeart ? 380 : 180 + Math.random() * 220,
                    particleCount: isHeart ? 280 : 160 + Math.floor(Math.random() * 200),
                };
            }

            function explodeRocket(rocket) {
                const ex = rocket.x;
                const ey = rocket.targetY;
                const count = rocket.particleCount;
                const colors = rocket.colors;

                if (rocket.isHeart || rocket.explosionSize > 300) {
                    screenFlash.style.display = 'block';
                    screenFlash.style.opacity = '1';
                    setTimeout(() => {
                        screenFlash.style.opacity = '0';
                        setTimeout(() => { screenFlash.style.display = 'none'; }, 100);
                    }, 60);
                }

                if (rocket.isHeart) {
                    for (let i = 0; i < count; i++) {
                        const t = i / count;
                        const curvePt = heartCurve(t, 1);
                        const dirX = curvePt.x;
                        const dirY = curvePt.y;
                        const dist = Math.sqrt(dirX * dirX + dirY * dirY) || 1;
                        const nx = dirX / dist;
                        const ny = dirY / dist;
                        const speed = 3.5 + Math.random() * 6.5;
                        const color = colors[Math.floor(Math.random() * colors.length)];
                        fwParticles.push({
                            x: ex, y: ey,
                            vx: nx * speed + (Math.random() - 0.5) * 1.8,
                            vy: ny * speed + (Math.random() - 0.5) * 1.8,
                            color: color, life: 1,
                            decay: 0.006 + Math.random() * 0.018,
                            size: 1.5 + Math.random() * 3.5,
                            gravity: 0.04, sparkle: Math.random() < 0.3,
                        });
                    }
                } else {
                    for (let i = 0; i < count; i++) {
                        const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
                        const speed = 2.5 + Math.random() * 7.5;
                        const color = colors[Math.floor(Math.random() * colors.length)];
                        fwParticles.push({
                            x: ex, y: ey,
                            vx: Math.cos(angle) * speed,
                            vy: Math.sin(angle) * speed,
                            color: color, life: 1,
                            decay: 0.007 + Math.random() * 0.02,
                            size: 1.2 + Math.random() * 3.2,
                            gravity: 0.045, sparkle: Math.random() < 0.25,
                        });
                    }
                }

                for (let i = 0; i < 40; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 0.3 + Math.random() * 2;
                    fwSparkles.push({
                        x: ex, y: ey,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 1, decay: 0.04 + Math.random() * 0.08,
                        size: 1 + Math.random() * 4,
                    });
                }
            }

            function startFireworks() {
                if (fireworksStarted) return;
                fireworksStarted = true;
                fwRunning = true;
                fwStartTime = performance.now();
                fwLastLaunchTime = fwStartTime;
                fwLaunchCount = 0;
                fwHeartLaunched = false;
                fwPhase = 0;
                fwParticles = [];
                fwRockets = [];
                fwSparkles = [];
                canvas.classList.add('active');
                canvas.style.display = 'block';
                ctx.clearRect(0, 0, canvasW, canvasH);
                requestAnimationFrame(fireworkLoop);
            }

            function fireworkLoop(timestamp) {
                if (!fwRunning) return;
                const elapsed = (timestamp - fwStartTime) / 1000;
                ctx.clearRect(0, 0, canvasW, canvasH);

                ctx.fillStyle = 'rgba(236,230,224,0.3)';
                ctx.fillRect(0, 0, canvasW, canvasH);

                if (elapsed < 3) fwPhase = 0;
                else if (elapsed < 6.5) fwPhase = 1;
                else if (elapsed < 9.5) fwPhase = 2;
                else fwPhase = 3;

                const launchIntervals = [0.15, 0.22, 0.3, 0.55];
                const interval = launchIntervals[fwPhase] || 0.5;
                const maxLaunches = [22, 18, 14, 6];
                const maxForPhase = maxLaunches[fwPhase] || 6;

                if (fwLaunchCount < maxForPhase && timestamp - fwLastLaunchTime > interval * 1000) {
                    fwRockets.push(createRocket());
                    fwLastLaunchTime = timestamp;
                    fwLaunchCount++;
                }

                if (fwPhase === 3 && fwLaunchCount < 8 && timestamp - fwLastLaunchTime > 0.35 * 1000 && elapsed < 10.5) {
                    fwRockets.push(createRocket());
                    fwLastLaunchTime = timestamp;
                    fwLaunchCount++;
                }

                for (let i = fwRockets.length - 1; i >= 0; i--) {
                    const r = fwRockets[i];
                    if (!r.exploded) {
                        if (Math.random() < 0.7) {
                            r.trailParticles.push({
                                x: r.x + (Math.random() - 0.5) * 4,
                                y: r.y, life: 1,
                                decay: 0.06 + Math.random() * 0.1,
                                size: 0.8 + Math.random() * 2,
                                color: '#93c5fd',
                            });
                        }
                        r.y -= r.speed;
                        r.speed *= 0.998;
                        if (r.y <= r.targetY) {
                            r.y = r.targetY;
                            r.exploded = true;
                            explodeRocket(r);
                        }
                    }
                    if (!r.exploded) {
                        ctx.fillStyle = '#ffffff';
                        ctx.shadowColor = '#60a5fa';
                        ctx.shadowBlur = 10;
                        ctx.beginPath();
                        ctx.arc(r.x, r.y, 3, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                    for (let j = r.trailParticles.length - 1; j >= 0; j--) {
                        const tp = r.trailParticles[j];
                        tp.life -= tp.decay;
                        if (tp.life <= 0) { r.trailParticles.splice(j, 1); continue; }
                        ctx.fillStyle = `rgba(147,197,253,${tp.life})`;
                        ctx.beginPath();
                        ctx.arc(tp.x, tp.y, tp.size * tp.life, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    if (r.exploded && r.trailParticles.length === 0) {
                        fwRockets.splice(i, 1);
                    }
                }

                for (let i = fwParticles.length - 1; i >= 0; i--) {
                    const p = fwParticles[i];
                    p.life -= p.decay;
                    if (p.life <= 0) { fwParticles.splice(i, 1); continue; }
                    p.vy += p.gravity;
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vx *= 0.995;
                    p.vy *= 0.995;

                    const alpha = p.life;
                    const r = parseInt(p.color.slice(1, 3), 16);
                    const g = parseInt(p.color.slice(3, 5), 16);
                    const b = parseInt(p.color.slice(5, 7), 16);
                    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                    if (p.sparkle && p.life > 0.5) {
                        ctx.shadowColor = p.color;
                        ctx.shadowBlur = 6 * alpha;
                    }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                for (let i = fwSparkles.length - 1; i >= 0; i--) {
                    const s = fwSparkles[i];
                    s.life -= s.decay;
                    if (s.life <= 0) { fwSparkles.splice(i, 1); continue; }
                    s.x += s.vx;
                    s.y += s.vy;
                    ctx.fillStyle = `rgba(255,255,255,${s.life})`;
                    ctx.shadowColor = '#ffffff';
                    ctx.shadowBlur = 8 * s.life;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                const allDone = fwRockets.length === 0 && fwParticles.length === 0 && fwSparkles.length === 0 &&
                    elapsed > 9 && fwLaunchCount >= 30;
                const timeout = elapsed > 13;

                if ((allDone || timeout) && fwPhase >= 3) {
                    fwRunning = false;
                    canvas.classList.remove('active');
                    setTimeout(() => {
                        if (!fwRunning) {
                            canvas.style.display = 'none';
                            ctx.clearRect(0, 0, canvasW, canvasH);
                        }
                    }, 600);
                    setTimeout(showBlessCard, 800);
                    return;
                }

                requestAnimationFrame(fireworkLoop);
            }

            function saveBlessingImage() {

                const W = 600, H = 800;

                // 暖色背景
                ctx.fillStyle = '#fdf6f0';
                ctx.fillRect(0, 0, W, H);

                // 白色卡片
                ctx.shadowColor = 'rgba(0,0,0,0.06)'; ctx.shadowBlur = 40;
                ctx.fillStyle = '#ffffff';
                roundRect(ctx, 60, 60, 480, 650, 20);
                ctx.fill(); ctx.shadowBlur = 0;

                // 顶部蓝色装饰条
                ctx.fillStyle = '#3b82f6';
                roundRect(ctx, 260, 90, 80, 3, 2); ctx.fill();

                // 标题
                ctx.fillStyle = '#1e293b';
                ctx.font = 'bold 28px "PingFang SC", "Microsoft YaHei", sans-serif';
                ctx.textAlign = 'center'; ctx.textBaseline = 'top';

                ctx.fillStyle = '#3b82f6';
                ctx.font = '18px "PingFang SC", "Microsoft YaHei", sans-serif';
                ctx.fillText('伍希彦', 300, 170);

                // 分隔线
                ctx.strokeStyle = 'rgba(59,130,246,0.12)';
                ctx.lineWidth = 1; ctx.beginPath();
                ctx.moveTo(180, 210); ctx.lineTo(420, 210); ctx.stroke();

                // 祝福正文
                ctx.fillStyle = '#475569';
                ctx.font = '17px "PingFang SC", "Microsoft YaHei", sans-serif';
                const year = new Date().getFullYear();
                ctx.fillText(`🎂 祝你 ${year} 岁生日快乐`, 300, 248);
                const bdayNum = new Date().getFullYear() - 2011;
                ctx.fillText(`🥳 第${bdayNum}个生日 · 开开心心`, 300, 288);
                ctx.fillText('⚽ 保持对足球的热爱，取得成功', 300, 328);
                ctx.fillText('🤝 希望我们永远是好朋友', 300, 368);

                // 祝福语
                ctx.fillStyle = '#64748b';
                ctx.font = '15px "PingFang SC", "Microsoft YaHei", sans-serif';
                ctx.fillText('愿每一年你都可以开开心心', 300, 440);

                // 落款
                ctx.fillStyle = '#94a3b8';
                ctx.font = '13px "PingFang SC", sans-serif';
                const now = new Date();
                ctx.fillText('—— 机长 · 祝福 ——', 300, 520);
                ctx.fillText(`${now.getFullYear()}年${now.getMonth()+1}月 · 第${bdayNum}个生日`, 300, 550);

                // 触发下载
                const link = document.createElement('a');
                link.download = '来自机长的祝福-伍希彦.png';
                link.href = c.toDataURL('image/png');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
            function roundRect(ctx, x, y, w, h, r) {
                ctx.beginPath();
                ctx.moveTo(x + r, y);
                ctx.lineTo(x + w - r, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + r);
                ctx.lineTo(x + w, y + h - r);
                ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                ctx.lineTo(x + r, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - r);
                ctx.lineTo(x, y + r);
                ctx.quadraticCurveTo(x, y, x + r, y);
                ctx.closePath();
                ctx.fill();
            }
            document.getElementById('saveBtn').addEventListener('click', saveBlessingImage);

            // ---- Crypto helper (XOR + Base64) ----

            // ---- 下一个：二维码弹窗 ----
            document.getElementById('nextBtn').addEventListener('click', () => {
                document.getElementById('qrcodeOverlay').classList.add('show');
            });
            document.getElementById('qrClose').addEventListener('click', () => {
                document.getElementById('qrcodeOverlay').classList.remove('show');
            });
            document.getElementById('qrcodeOverlay').addEventListener('click', (e) => {
                if (e.target === e.currentTarget)
                    document.getElementById('qrcodeOverlay').classList.remove('show');
            });
            function xorDecrypt(b64, key) {
                const str = atob(b64);
                let r = '';
                for (let i = 0; i < str.length; i++) r += String.fromCharCode(str.charCodeAt(i) ^ key.charCodeAt(i % key.length));
                return r;
            }
            // ---- 留言板（GitHub Issues API） ----
            const GITHUB_TOKEN = xorDecrypt('EBAJLDp6VkADPEocNAd4YjoBNyAnfH5SJiFJMkZ1AnkADUpCMH1jWg==', 'wxysr315');
            const ISSUES_API = 'https://api.github.com/repos/raoroger380/wxysr315/issues';

            async function fetchMessages() {
                try {
                    const res = await fetch(`${ISSUES_API}?labels=message&state=open&per_page=50&sort=created&direction=desc`);
                    if (!res.ok) throw new Error('Fetch failed');
                    const issues = await res.json();
                    return issues.map(issue => {
                        const nameMatch = issue.body ? issue.body.match(/^name:(.*)$/m) : null;
                        return {
                            title: issue.title,
                            name: nameMatch ? nameMatch[1].trim() : '',
                            time: issue.created_at,
                        };
                    });
                } catch (e) {
                    return [];
                }
            }

            function displayMessages(messages) {
                const container = document.getElementById('msgItems');
                const empty = document.getElementById('msgEmpty');
                if (messages.length === 0) {
                    container.innerHTML = '<div class="msg-empty">还没有祝福，快来留言吧 💬</div>';
                    return;
                }
                container.innerHTML = messages.map(msg => {
                    const nameHtml = msg.name ? `<div class="msg-item-name">${escapeHtml(msg.name)}</div>` : '';
                    const timeStr = msg.time ? new Date(msg.time).toLocaleDateString('zh-CN') : '';
                    return `
                        <div class="msg-item">
                            ${nameHtml}
                            <div class="msg-item-text">${escapeHtml(msg.title)}</div>
                            <div class="msg-item-time">${timeStr}</div>
                        </div>
                    `;
                }).join('');
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            async function submitMessage(name, content) {
                const title = name ? `${content} — ${name}` : content;
                try {
                    const res = await fetch(ISSUES_API, {
                        method: 'POST',
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ title, body: name ? `name:${name}` : 'name:匿名', labels: ['message'] }),
                    });
                    if (!res.ok) throw new Error('Submit failed');
                    showMsgToast('祝福已发送 ✨ 将出现在首页弹幕中');
                    return true;
                } catch (e) {
                    showMsgToast('发送失败，请稍后再试');
                    return false;
                }
            }

            function showMsgToast(text) {
                const existing = document.querySelector('.msg-toast');
                if (existing) existing.remove();
                const toast = document.createElement('div');
                toast.className = 'msg-toast';
                toast.textContent = text;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2200);
            }

            // 打开/关闭留言板
            function openMessageWall() {
                document.getElementById('messageOverlay').classList.add('show');
                loadAndDisplayMessages();
            }
            function closeMessageWall() {
                document.getElementById('messageOverlay').classList.remove('show');
            }

            async function loadAndDisplayMessages() {
                const msgs = await fetchMessages();
                displayMessages(msgs);
            }

            // 事件绑定
            document.getElementById('msgBtn').addEventListener('click', openMessageWall);
            document.getElementById('msgClose').addEventListener('click', closeMessageWall);
            document.getElementById('messageOverlay').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeMessageWall();
            });

            document.getElementById('msgSubmit').addEventListener('click', async () => {
                const nameInput = document.getElementById('msgName');
                const contentInput = document.getElementById('msgContent');
                const name = nameInput.value.trim();
                const content = contentInput.value.trim();
                if (!content) {
                    showMsgToast('请输入祝福内容');
                    return;
                }
                const btn = document.getElementById('msgSubmit');
                btn.disabled = true;
                btn.textContent = '发送中...';
                const ok = await submitMessage(name, content);
                btn.disabled = false;
                btn.textContent = '发送祝福 ✨';
                if (ok) {
                    contentInput.value = '';
                    nameInput.value = '';
                    await loadAndDisplayMessages();
                }
            });

            // 加载初始留言
            loadAndDisplayMessages();

            // ---- 管理后台入口（隐藏） ----
            document.getElementById('adminEntry').addEventListener('click', () => {
                window.location.href = 'admin.html';
            });
        })();

        (function(){
            var s=localStorage.getItem("theme");
            if(s==="dark"){document.body.classList.add("dark");createStars()}
            document.getElementById("themeLabel").textContent=s==="dark"?"深色":"浅色";
        })();
        document.getElementById("themeToggle").addEventListener("click",function(){
            document.body.classList.toggle("dark");
            var d=document.body.classList.contains("dark");
            localStorage.setItem("theme",d?"dark":"light");
            document.getElementById("themeLabel").textContent=d?"深色":"浅色";
            if(d)createStars();else removeStars();
        });
        var sc=null;
        function createStars(){if(sc)return;sc=document.createElement("div");sc.id="starContainer";sc.style.cssText="position:fixed;inset:0;z-index:0;pointer-events:none;";document.body.insertBefore(sc,document.body.firstChild);var f=document.createDocumentFragment();for(var i=0;i<120;i++){var st=document.createElement("div");var sz=Math.random()*2.5+1;st.style.cssText="position:absolute;width:"+sz+"px;height:"+sz+"px;background:#fff;border-radius:50%;left:"+Math.random()*100+"%;top:"+Math.random()*100+"%;opacity:"+(Math.random()*0.6+0.2)+";animation:starBlink "+(Math.random()*3+2)+"s ease-in-out "+(Math.random()*3)+"s infinite alternate;";f.appendChild(st)}sc.appendChild(f)}
        function removeStars(){if(sc){sc.remove();sc=null}}
        (function(){var s=document.createElement("style");s.textContent="@keyframes starBlink{0%{opacity:0.2;transform:scale(1)}100%{opacity:1;transform:scale(1.5)}}";document.head.appendChild(s)})();
    </script>
