<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>留言管理 · 伍希彦生日</title>
    <style>
        :root {
            --accent-rgb: 59, 130, 246;
            --bg: #ece6e0;
            --glass: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(var(--accent-rgb), 0.12);
            --glass-hover: rgba(var(--accent-rgb), 0.06);
            --accent: #3b82f6;
            --accent-soft: rgba(var(--accent-rgb), 0.08);
            --accent-glow: rgba(var(--accent-rgb), 0.1);
            --text: #1e293b;
            --text-secondary: #64748b;
            --danger: #ef4444;
            --danger-soft: rgba(239, 68, 68, 0.08);
            --success: #22c55e;
            --radius: 16px;
            --radius-sm: 10px;
            --radius-lg: 24px;
            --text-muted: #475569;
            --switch-bg: rgba(255,255,255,0.65);
            --switch-border: rgba(0,0,0,0.08);
            --switch-shadow: rgba(0,0,0,0.06);
            --grad-end-light: #60a5fa;
            --grad-end-dark: #2563eb;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { min-height: 100vh; background: var(--bg); color: var(--text); }
        body {
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(ellipse at 50% 30%, rgba(var(--accent-rgb), 0.03) 0%, transparent 60%),
                var(--bg);
        }

        /* ===== Login ===== */
        #loginScreen {
            position: fixed; inset: 0; z-index: 100;
            display: flex; justify-content: center; align-items: center;
            background: var(--bg);
            background:
                radial-gradient(ellipse at 50% 30%, rgba(var(--accent-rgb), 0.03) 0%, transparent 60%),
                var(--bg);
            transition: opacity 0.6s ease;
        }
        #loginScreen.hidden { opacity: 0; pointer-events: none; }
        .login-card {
            text-align: center;
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(var(--accent-rgb),0.12);
            border-radius: var(--radius-lg);
            padding: 40px 36px;
            box-shadow: 0 20px 60px rgba(var(--accent-rgb),0.08);
            max-width: 380px; width: 88%;
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .login-title {
            font-size: 1.5rem; color: var(--accent);
            letter-spacing: 2px; font-weight: 400;
            margin-bottom: 4px;
        }
        .login-sub {
            font-size: 0.85rem; color: var(--text-secondary);
            margin-bottom: 24px; font-weight: 300;
        }
        .login-input {
            width: 100%; padding: 12px 14px;
            border: 1px solid rgba(var(--accent-rgb),0.15);
            border-radius: var(--radius-sm);
            font-size: 1rem; font-family: inherit;
            background: rgba(255,255,255,0.6);
            color: var(--text); outline: none;
            transition: border-color 0.3s;
            margin-bottom: 14px;
            text-align: center;
            letter-spacing: 4px;
        }
        .login-input:focus { border-color: var(--accent); }
        .login-btn {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, var(--accent), var(--grad-end-dark));
            color: #fff; border: none;
            border-radius: var(--radius-sm);
            font-size: 0.95rem; font-family: inherit;
            cursor: pointer; letter-spacing: 2px;
            transition: all 0.3s;
        }
        .login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(var(--accent-rgb),0.3); }
        .login-btn:active { transform: translateY(1px); }
        .login-error {
            color: var(--danger); font-size: 0.82rem;
            margin-top: 10px; opacity: 0;
            transition: opacity 0.3s;
        }
        .login-error.show { opacity: 1; }
        .login-back {
            display: inline-block; margin-top: 16px;
            color: var(--text-secondary); font-size: 0.78rem;
            text-decoration: none; opacity: 0.5;
            transition: opacity 0.3s;
        }
        .login-back:hover { opacity: 1; }

        /* ===== Admin Panel ===== */
        #adminPanel {
            max-width: 800px; margin: 0 auto;
            padding: 24px 16px 80px;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        #adminPanel.show { opacity: 1; }

        .admin-header {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 12px;
            margin-bottom: 20px;
        }
        .admin-header h1 {
            font-size: 1.3rem; font-weight: 400;
            color: var(--accent); letter-spacing: 2px;
        }
        .admin-header-left {
            display: flex; align-items: center; gap: 20px;
        }
        .admin-stats {
            font-size: 0.8rem; color: var(--text-secondary);
            background: rgba(255,255,255,0.4);
            padding: 6px 14px; border-radius: 20px;
            border: 1px solid rgba(var(--accent-rgb),0.08);
        }
        .admin-actions { display: flex; gap: 8px; }
        .admin-btn {
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.82rem; font-family: inherit;
            cursor: pointer; letter-spacing: 0.5px;
            transition: all 0.3s;
            border: 1px solid transparent;
            touch-action: manipulation;
        }
        .admin-btn-outline {
            background: rgba(var(--accent-rgb),0.06);
            border-color: rgba(var(--accent-rgb),0.15);
            color: var(--accent);
        }
        .admin-btn-outline:hover {
            background: rgba(var(--accent-rgb),0.1);
            border-color: rgba(var(--accent-rgb),0.3);
        }
        .admin-btn-text {
            background: none; border: none;
            color: var(--text-secondary); font-size: 0.8rem;
        }
        .admin-btn-text:hover { color: var(--text); }

        /* ===== Message Table ===== */
        .msg-table-wrap {
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(var(--accent-rgb),0.1);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(var(--accent-rgb),0.04);
        }
        .msg-table {
            width: 100%; border-collapse: collapse;
            font-size: 0.85rem;
        }
        .msg-table thead {
            background: rgba(var(--accent-rgb),0.04);
            border-bottom: 1px solid rgba(var(--accent-rgb),0.08);
        }
        .msg-table th {
            padding: 12px 14px; text-align: left;
            font-weight: 400; color: var(--text-secondary);
            font-size: 0.78rem; letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .msg-table td {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(var(--accent-rgb),0.04);
            vertical-align: middle;
        }
        .msg-table tr:last-child td { border-bottom: none; }
        .msg-table tr:hover td { background: rgba(var(--accent-rgb),0.02); }

        .col-index { width: 40px; text-align: center; color: var(--text-secondary); font-size: 0.75rem; }
        .col-name { width: 90px; }
        .col-content { }
        .col-time { width: 100px; font-size: 0.75rem; color: var(--text-secondary); white-space: nowrap; }
        .col-action { width: 70px; text-align: center; }

        .msg-name {
            font-weight: 500; color: var(--accent); font-size: 0.8rem;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80px;
        }
        .msg-name.anon { color: var(--text-secondary); opacity: 0.5; font-weight: 300; }
        .msg-content-text {
            line-height: 1.5; word-break: break-word;
        }

        .del-btn {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 5px 12px;
            border: 1px solid rgba(239,68,68,0.15);
            background: rgba(239,68,68,0.04);
            color: var(--danger);
            border-radius: 30px;
            font-size: 0.72rem; font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            touch-action: manipulation;
        }
        .del-btn:hover {
            background: rgba(239,68,68,0.1);
            border-color: rgba(239,68,68,0.3);
            box-shadow: 0 0 12px rgba(239,68,68,0.1);
        }
        .del-btn:disabled {
            opacity: 0.35; cursor: not-allowed; box-shadow: none !important;
        }
        .del-btn .icon { font-size: 0.9rem; line-height: 1; }

        .msg-empty-state {
            text-align: center; padding: 48px 20px;
            color: var(--text-secondary); font-size: 0.9rem;
        }
        .msg-empty-state .icon { font-size: 2rem; margin-bottom: 12px; }

        /* ===== Loading ===== */
        .loading-dots {
            text-align: center; padding: 40px 0;
            color: var(--text-secondary); font-size: 0.85rem;
        }
        .loading-dots span {
            animation: dotPulse 1.4s ease-in-out infinite both;
            display: inline-block;
        }
        .loading-dots span:nth-child(1) { animation-delay: 0s; }
        .loading-dots span:nth-child(2) { animation-delay: 0.16s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.32s; }
        @keyframes dotPulse {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
            40% { opacity: 1; transform: scale(1.15); }
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            color: #fff; padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-size: 0.9rem; z-index: 99999;
            pointer-events: none;
            animation: toastAnim 2.2s ease forwards;
        }
        @keyframes toastAnim {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            12% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            78% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
        }

        /* ===== Confirm Dialog ===== */
        .confirm-overlay {
            position: fixed; inset: 0; z-index: 99998;
            background: rgba(0,0,0,0.12);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: none;
            justify-content: center; align-items: center;
            padding: 20px;
        }
        .confirm-overlay.show { display: flex; }
        .confirm-box {
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(var(--accent-rgb),0.15);
            border-radius: var(--radius-lg);
            padding: 28px 24px;
            max-width: 360px; width: 88%;
            text-align: center;
            box-shadow: 0 24px 80px rgba(var(--accent-rgb),0.15);
            animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0.85); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .confirm-icon { font-size: 2rem; margin-bottom: 10px; }
        .confirm-title { font-size: 1.1rem; color: var(--text); letter-spacing: 1px; margin-bottom: 6px; }
        .confirm-desc { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.6; margin-bottom: 20px; }
        .confirm-btns { display: flex; gap: 10px; justify-content: center; }
        .confirm-btn {
            padding: 10px 24px; border-radius: 30px;
            font-size: 0.85rem; font-family: inherit;
            cursor: pointer; border: 1px solid transparent;
            transition: all 0.3s;
            touch-action: manipulation;
        }
        .confirm-btn-cancel {
            background: rgba(var(--accent-rgb),0.06);
            border-color: rgba(var(--accent-rgb),0.15);
            color: var(--text);
        }
        .confirm-btn-cancel:hover {
            background: rgba(var(--accent-rgb),0.1);
            border-color: rgba(var(--accent-rgb),0.3);
        }
        .confirm-btn-danger {
            background: var(--danger);
            color: #fff;
        }
        .confirm-btn-danger:hover {
            box-shadow: 0 4px 16px rgba(239,68,68,0.3);
            transform: translateY(-1px);
        }

        /* ===== Responsive ===== */
        @media (max-width: 640px) {
            .admin-header { flex-direction: column; align-items: stretch; text-align: center; }
            .admin-header-left { justify-content: center; }
            .admin-actions { justify-content: center; }
            .msg-table thead { display: none; }
            .msg-table, .msg-table tbody, .msg-table tr, .msg-table td { display: block; }
            .msg-table tr {
                padding: 14px; border-bottom: 1px solid rgba(var(--accent-rgb),0.08);
                position: relative;
            }
            .msg-table tr:last-child { border-bottom: none; }
            .msg-table td {
                padding: 2px 0; border: none;
                text-align: left;
            }
            .col-index { display: none; }
            .col-name { font-size: 0; }
            .col-name .msg-name { font-size: 0.78rem; display: inline-block; margin-bottom: 4px; }
            .col-time { font-size: 0.68rem; }
            .col-action { margin-top: 8px; }
            .del-btn { font-size: 0.7rem; padding: 4px 10px; }
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(var(--accent-rgb),0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(var(--accent-rgb),0.25); }

        /* ===== Photo Management ===== */
        .admin-tabs {
            display: flex; gap: 2px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.3);
            border-radius: 40px;
            padding: 3px;
            border: 1px solid rgba(var(--accent-rgb),0.08);
            width: fit-content;
        }
        .admin-tab {
            padding: 8px 22px;
            border-radius: 30px;
            font-size: 0.82rem;
            font-family: inherit;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            transition: all 0.3s;
            letter-spacing: 1px;
            touch-action: manipulation;
        }
        .admin-tab.active {
            background: rgba(255,255,255,0.6);
            color: var(--accent);
            box-shadow: 0 2px 8px rgba(var(--accent-rgb),0.06);
        }
        .admin-tab:hover:not(.active) { color: var(--text); }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 14px;
            padding: 4px 0;
        }
        .photo-card {
            background: rgba(255,255,255,0.4);
            border-radius: var(--radius);
            border: 1px solid rgba(var(--accent-rgb),0.08);
            overflow: hidden;
            transition: all 0.3s;
            position: relative;
        }
        .photo-card:hover {
            box-shadow: 0 8px 24px rgba(var(--accent-rgb),0.08);
            border-color: rgba(var(--accent-rgb),0.15);
        }
        .photo-card img {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            display: block;
            background: rgba(var(--accent-rgb),0.02);
            cursor: pointer;
        }
        .photo-card .photo-card-info {
            padding: 8px 10px;
        }
        .photo-card .photo-card-title {
            font-size: 0.72rem;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .photo-card .photo-card-time {
            font-size: 0.6rem;
            color: var(--text-secondary);
            opacity: 0.5;
            margin-top: 2px;
        }
        .photo-card .photo-del-btn {
            position: absolute;
            top: 6px; right: 6px;
            width: 26px; height: 26px;
            border-radius: 50%;
            border: none;
            background: rgba(239,68,68,0.7);
            color: #fff;
            font-size: 0.8rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }
        .photo-card:hover .photo-del-btn { opacity: 1; }

        .photo-detail-overlay {
            position: fixed; inset: 0; z-index: 99999;
            background: rgba(0,0,0,0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            justify-content: center; align-items: center;
            padding: 20px;
        }
        .photo-detail-overlay.show { display: flex; }
        .photo-detail-box {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(var(--accent-rgb),0.12);
            border-radius: var(--radius-lg);
            padding: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            text-align: center;
            box-shadow: 0 24px 80px rgba(var(--accent-rgb),0.12);
            animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .photo-detail-box img {
            width: 100%;
            max-height: 60vh;
            object-fit: contain;
            border-radius: var(--radius-sm);
            background: rgba(0,0,0,0.02);
        }
        .photo-detail-info {
            margin-top: 12px;
            text-align: left;
        }
        .photo-detail-info .detail-note {
            font-size: 0.9rem;
            color: var(--text);
            margin-bottom: 4px;
        }
        .photo-detail-info .detail-time {
            font-size: 0.72rem;
            color: var(--text-secondary);
        }
        .photo-detail-close {
            margin-top: 14px;
            padding: 8px 24px;
            border-radius: 30px;
            border: 1px solid rgba(var(--accent-rgb),0.15);
            background: rgba(var(--accent-rgb),0.06);
            color: var(--text);
            font-size: 0.82rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            touch-action: manipulation;
        }
        .photo-detail-close:hover {
            background: rgba(var(--accent-rgb),0.1);
            border-color: rgba(var(--accent-rgb),0.3);
        }
        .photo-empty {
            text-align: center; padding: 48px 20px;
            color: var(--text-secondary); font-size: 0.9rem;
        }
        .photo-empty .icon { font-size: 2rem; margin-bottom: 12px; }

        /* ===== 暗色主题 ===== */
        body.dark {
            --accent-rgb: 180, 180, 200;
            --accent: #b4b4c8;
            --bg: #080808;
            --glass: rgba(25, 25, 35, 0.7);
            --glass-border: rgba(180, 180, 200, 0.15);
            --glass-hover: rgba(180, 180, 200, 0.06);
            --accent-soft: rgba(180, 180, 200, 0.1);
            --accent-glow: rgba(180, 180, 200, 0.12);
            --text: #f0f0f5;
            --text-muted: #b0b0c0;
            --text-secondary: #9090a0;
            --switch-bg: rgba(30, 30, 40, 0.8);
            --switch-border: rgba(255,255,255,0.12);
            --switch-shadow: rgba(0,0,0,0.4);
            --grad-end-light: #d0d0dc;
            --grad-end-dark: #a0a0b4;
            background: #080808;
        }
        body.dark [class*="card"], body.dark [class*="popup"], body.dark [class*="modal"],
        body.dark [class*="overlay"], body.dark [class*="wrap"], body.dark [class*="panel"] {
            background-color: rgba(25, 25, 35, 0.75) !important; }
        body.dark input, body.dark textarea { color: #f0f0f5 !important; }
        body.dark ::placeholder { color: #707080 !important; }
        body.dark small, body.dark [class*="muted"], body.dark [class*="hint"] { color: #a0a0b0 !important; }

        /* 主题切换按钮 */
        .theme-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 100001;
            display: flex; align-items: center; gap: 8px;
            background: var(--switch-bg);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--switch-border);
            box-shadow: 0 2px 12px var(--switch-shadow);
            border-radius: 28px; padding: 4px 6px 4px 14px;
            cursor: pointer; user-select: none; -webkit-user-select: none;
            transition: background 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
        }
        .theme-toggle:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.1); }
        .theme-toggle .theme-label {
            font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap;
            transition: color 0.35s ease; pointer-events: none;
        }
        .theme-toggle .theme-knob-wrapper {
            width: 48px; height: 26px; border-radius: 13px;
            background: #e2e8f0; position: relative; flex-shrink: 0;
            transition: background 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.dark .theme-toggle .theme-knob-wrapper { background: #334155; }
        .theme-toggle .theme-knob {
            position: absolute; top: 3px; left: 3px; width: 20px; height: 20px;
            border-radius: 50%; background: #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.dark .theme-toggle .theme-knob { transform: translateX(22px); }
        .theme-toggle .theme-icon {
            position: absolute; top: 50%; transform: translateY(-50%);
            font-size: 12px; line-height: 1; transition: opacity 0.25s ease; pointer-events: none;
        }
        .theme-toggle .theme-icon.sun { left: 5px; opacity: 1; }
        .theme-toggle .theme-icon.moon { right: 5px; opacity: 0.3; }
        body.dark .theme-toggle .theme-icon.sun { opacity: 0.3; }
        body.dark .theme-toggle .theme-icon.moon { opacity: 1; }
    </style>
</head>
<body>
    <div class="theme-toggle" id="themeToggle" title="切换主题">
        <span class="theme-label" id="themeLabel">浅色</span>
        <div class="theme-knob-wrapper"><span class="theme-icon sun">☀️</span><span class="theme-icon moon">🌙</span><div class="theme-knob"></div></div>
    </div>

    <!-- ===== Login ===== -->
    <div id="loginScreen">
        <div class="login-card">
            <div class="login-title">留言管理</div>
            <div class="login-sub">伍希彦 · 生日祝福</div>
            <input type="password" id="loginPassword" class="login-input" placeholder="管理员密码" maxlength="20" autocomplete="off">
            <button id="loginBtn" class="login-btn">进入管理后台</button>
            <div class="login-error" id="loginError">密码错误，请重试</div>
            <a href="index.html" class="login-back">← 返回首页</a>
        </div>
    </div>

    <!-- ===== Admin Panel ===== -->
    <div id="adminPanel">
        <div class="admin-header">
            <div class="admin-header-left">
                <h1>📋 管理后台</h1>
                <span class="admin-stats" id="statsTotal">加载中...</span>
            </div>
            <div class="admin-actions">
                <button class="admin-btn admin-btn-outline" id="refreshBtn">⟳ 刷新</button>
                <button class="admin-btn admin-btn-text" id="logoutBtn">退出</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="admin-tabs">
            <button class="admin-tab active" data-tab="messages">💬 留言</button>
            <button class="admin-tab" data-tab="photos">📸 照片</button>
        </div>

        <!-- Messages Section -->
        <div id="messagesSection" class="tab-section">
            <div class="msg-table-wrap">
                <div id="loadingState" class="loading-dots">
                    <span>·</span><span>·</span><span>·</span> 加载留言中
                </div>
                <div id="emptyState" class="msg-empty-state hidden">
                    <div class="icon">📭</div>
                    <div>还没有任何留言</div>
                </div>
                <div id="tableContainer" class="hidden">
                    <table class="msg-table">
                        <thead>
                            <tr>
                                <th class="col-index">#</th>
                                <th class="col-name">留言者</th>
                                <th class="col-content">祝福内容</th>
                                <th class="col-time">时间</th>
                                <th class="col-action">操作</th>
                            </tr>
                        </thead>
                        <tbody id="msgTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Photos Section -->
        <div id="photosSection" class="tab-section" style="display:none;">
            <div class="msg-table-wrap" style="padding:16px;">
                <div id="photoLoading" class="loading-dots">
                    <span>·</span><span>·</span><span>·</span> 加载照片中
                </div>
                <div id="photoEmpty" class="photo-empty hidden">
                    <div class="icon">📸</div>
                    <div>还没有保存的照片</div>
                </div>
                <div id="photoGrid" class="photo-grid hidden"></div>
            </div>
        </div>

        <div style="text-align:center;margin-top:12px;">
            <span style="font-size:0.72rem;color:var(--text-secondary);opacity:0.3;">管理入口 · 仅管理员可见</span>
        </div>
    </div>

    <!-- ===== Photo Detail Overlay ===== -->
    <div class="photo-detail-overlay" id="photoDetailOverlay">
        <div class="photo-detail-box">
            <img id="photoDetailImg" src="" alt="photo">
            <div class="photo-detail-info">
                <div class="detail-note" id="photoDetailNote"></div>
                <div class="detail-time" id="photoDetailTime"></div>
            </div>
            <button class="photo-detail-close" id="photoDetailClose">关闭</button>
        </div>
    </div>

    <!-- ===== Confirm Dialog ===== -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-box">
            <div class="confirm-icon">🗑️</div>
            <div class="confirm-title">确认删除</div>
            <div class="confirm-desc" id="confirmDesc">确定要删除这条留言吗？</div>
            <div class="confirm-btns">
                <button class="confirm-btn confirm-btn-cancel" id="confirmCancel">取消</button>
                <button class="confirm-btn confirm-btn-danger" id="confirmOk">删除</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ===== Crypto helper (XOR + Base64) =====
            function xorDecrypt(b64, key) {
                const str = atob(b64);
                let r = '';
                for (let i = 0; i < str.length; i++) r += String.fromCharCode(str.charCodeAt(i) ^ key.charCodeAt(i % key.length));
                return r;
            }
            // ===== Configuration =====
            const ADMIN_PASSWORD = xorDecrypt('RElMQ0MC', 'wxysr315');
            const GITHUB_TOKEN = xorDecrypt('EBAJLDp6VkADPEocNAd4YjoBNyAnfH5SJiFJMkZ1AnkADUpCMH1jWg==', 'wxysr315');
            const ISSUES_API = 'https://api.github.com/repos/raoroger380/wxysr315/issues';

            // ===== DOM refs =====
            const loginScreen = document.getElementById('loginScreen');
            const loginPassword = document.getElementById('loginPassword');
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');
            const adminPanel = document.getElementById('adminPanel');
            const refreshBtn = document.getElementById('refreshBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const statsTotal = document.getElementById('statsTotal');
            const loadingState = document.getElementById('loadingState');
            const emptyState = document.getElementById('emptyState');
            const tableContainer = document.getElementById('tableContainer');
            const msgTableBody = document.getElementById('msgTableBody');
            const confirmOverlay = document.getElementById('confirmOverlay');
            const confirmDesc = document.getElementById('confirmDesc');
            const confirmCancel = document.getElementById('confirmCancel');
            const confirmOk = document.getElementById('confirmOk');

            // ===== State =====
            let allMessages = [];
            let pendingDeleteIssueNumber = null;
            let pendingDeleteContent = '';
            let isDeleting = false;

            // ===== Helpers =====
            function escapeHtml(str) {
                const d = document.createElement('div');
                d.textContent = str;
                return d.innerHTML;
            }

            function showToast(text) {
                const existing = document.querySelector('.toast');
                if (existing) existing.remove();
                const t = document.createElement('div');
                t.className = 'toast';
                t.textContent = text;
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 2400);
            }

            function formatTime(isoStr) {
                if (!isoStr) return '';
                try {
                    const d = new Date(isoStr);
                    const month = String(d.getMonth() + 1).padStart(2, '0');
                    const day = String(d.getDate()).padStart(2, '0');
                    const hour = String(d.getHours()).padStart(2, '0');
                    const min = String(d.getMinutes()).padStart(2, '0');
                    return `${month}-${day} ${hour}:${min}`;
                } catch (e) {
                    return isoStr;
                }
            }

            // ===== GitHub API =====
            async function fetchMessages() {
                try {
                    const res = await fetch(`${ISSUES_API}?labels=message&state=all&per_page=100&sort=created&direction=desc`);
                    if (!res.ok) throw new Error('Fetch failed: ' + res.status);
                    const issues = await res.json();
                    return issues.map(issue => {
                        const nameMatch = issue.body ? issue.body.match(/^name:(.*)$/m) : null;
                        return {
                            issueNumber: issue.number,
                            title: issue.title,
                            name: nameMatch ? nameMatch[1].trim() : '',
                            time: issue.created_at,
                            state: issue.state, // 'open' or 'closed'
                        };
                    });
                } catch (e) {
                    console.error('Fetch messages error:', e);
                    return null;
                }
            }

            async function closeIssue(issueNumber) {
                try {
                    const res = await fetch(`${ISSUES_API}/${issueNumber}`, {
                        method: 'PATCH',
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ state: 'closed' }),
                    });
                    if (!res.ok) throw new Error('Close failed: ' + res.status);
                    return true;
                } catch (e) {
                    console.error('Close issue error:', e);
                    return false;
                }
            }

            // ===== Render =====
            function renderMessages(messages) {
                if (messages === null) {
                    loadingState.classList.add('hidden');
                    emptyState.classList.add('hidden');
                    tableContainer.classList.remove('hidden');
                    msgTableBody.innerHTML = `
                        <tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text-secondary);">
                            ⚠️ 加载失败，请检查网络连接后<a href="#" id="retryLink" style="color:var(--accent);text-decoration:none;">重试</a>
                        </td></tr>`;
                    document.getElementById('retryLink')?.addEventListener('click', (e) => {
                        e.preventDefault();
                        loadAndRender();
                    });
                    return;
                }

                // Filter: only show open (active) messages; count total
                const openMessages = messages.filter(m => m.state === 'open');

                statsTotal.textContent = `共 ${messages.length} 条 · ${openMessages.length} 条活跃`;

                if (openMessages.length === 0) {
                    loadingState.classList.add('hidden');
                    emptyState.classList.remove('hidden');
                    tableContainer.classList.add('hidden');
                    return;
                }

                loadingState.classList.add('hidden');
                emptyState.classList.add('hidden');
                tableContainer.classList.remove('hidden');

                msgTableBody.innerHTML = openMessages.map((msg, idx) => {
                    const nameHtml = msg.name
                        ? `<span class="msg-name">${escapeHtml(msg.name)}</span>`
                        : `<span class="msg-name anon">匿名</span>`;
                    const content = msg.title;
                    return `
                        <tr data-issue="${msg.issueNumber}">
                            <td class="col-index">${idx + 1}</td>
                            <td class="col-name">${nameHtml}</td>
                            <td class="col-content"><span class="msg-content-text">${escapeHtml(content)}</span></td>
                            <td class="col-time">${formatTime(msg.time)}</td>
                            <td class="col-action">
                                <button class="del-btn" data-issue="${msg.issueNumber}" data-content="${escapeHtml(content)}">
                                    <span class="icon">✕</span> 删除
                                </button>
                            </td>
                        </tr>`;
                }).join('');

                // Bind delete buttons
                msgTableBody.querySelectorAll('.del-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const issueNum = parseInt(btn.dataset.issue);
                        const content = btn.dataset.content;
                        pendingDeleteIssueNumber = issueNum;
                        pendingDeleteContent = content;
                        confirmDesc.textContent = `确定要删除这条留言吗？\n"${content}"`;
                        confirmOverlay.classList.add('show');
                    });
                });
            }

            async function loadAndRender() {
                loadingState.classList.remove('hidden');
                emptyState.classList.add('hidden');
                tableContainer.classList.add('hidden');
                statsTotal.textContent = '加载中...';

                const messages = await fetchMessages();
                allMessages = messages || [];
                renderMessages(messages);
            }

            // ===== Delete flow =====
            confirmCancel.addEventListener('click', () => {
                confirmOverlay.classList.remove('show');
                pendingDeleteIssueNumber = null;
                pendingDeleteContent = '';
                pendingDeleteIsPhoto = false;
            });

            confirmOverlay.addEventListener('click', (e) => {
                if (e.target === e.currentTarget) {
                    confirmOverlay.classList.remove('show');
                    pendingDeleteIssueNumber = null;
                    pendingDeleteContent = '';
                    pendingDeleteIsPhoto = false;
                }
            });

            confirmOk.addEventListener('click', async () => {
                if (isDeleting || pendingDeleteIssueNumber === null) return;
                isDeleting = true;
                confirmOk.textContent = '删除中...';
                confirmOk.disabled = true;

                const ok = await closeIssue(pendingDeleteIssueNumber);
                if (ok) {
                    showToast('已删除 ✅');
                    confirmOverlay.classList.remove('show');
                    if (pendingDeleteIsPhoto) {
                        pendingDeleteIsPhoto = false;
                        await loadPhotos();
                    } else {
                        await loadAndRender();
                    }
                } else {
                    showToast('删除失败，请稍后再试');
                    confirmOverlay.classList.remove('show');
                }

                isDeleting = false;
                confirmOk.textContent = '删除';
                confirmOk.disabled = false;
                pendingDeleteIssueNumber = null;
                pendingDeleteContent = '';
                pendingDeleteIsPhoto = false;
            });

            // ===== Login =====
            loginBtn.addEventListener('click', doLogin);
            loginPassword.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') doLogin();
            });

            function doLogin() {
                const pwd = loginPassword.value.trim();
                if (pwd === ADMIN_PASSWORD) {
                    loginError.classList.remove('show');
                    loginScreen.classList.add('hidden');
                    adminPanel.classList.add('show');
                    loadAndRender();
                } else {
                    loginError.classList.add('show');
                    loginPassword.value = '';
                    loginPassword.focus();
                }
            }

            // ===== Logout =====
            logoutBtn.addEventListener('click', () => {
                adminPanel.classList.remove('show');
                loginScreen.classList.remove('hidden');
                loginPassword.value = '';
                loginPassword.focus();
                loginError.classList.remove('show');
            });

            // ===== Tabs =====
            const tabButtons = document.querySelectorAll('.admin-tab');
            const messagesSection = document.getElementById('messagesSection');
            const photosSection = document.getElementById('photosSection');

            tabButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    tabButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const tab = btn.dataset.tab;
                    if (tab === 'messages') {
                        messagesSection.style.display = 'block';
                        photosSection.style.display = 'none';
                    } else {
                        messagesSection.style.display = 'none';
                        photosSection.style.display = 'block';
                        loadPhotos();
                    }
                });
            });

            // ===== Photo Management =====
            let allPhotoIssues = [];

            async function loadPhotos() {
                const photoLoading = document.getElementById('photoLoading');
                const photoEmpty = document.getElementById('photoEmpty');
                const photoGrid = document.getElementById('photoGrid');

                photoLoading.classList.remove('hidden');
                photoEmpty.classList.add('hidden');
                photoGrid.classList.add('hidden');

                try {
                    const res = await fetch(`${ISSUES_API}?labels=photo&state=all&per_page=100&sort=created&direction=desc`);
                    if (!res.ok) throw new Error('Fetch failed');
                    allPhotoIssues = await res.json();
                    renderPhotos(allPhotoIssues);
                } catch (e) {
                    photoLoading.classList.add('hidden');
                    photoGrid.innerHTML = '<div class="photo-empty">⚠️ 加载失败</div>';
                    photoGrid.classList.remove('hidden');
                }
            }

            function renderPhotos(issues) {
                const photoLoading = document.getElementById('photoLoading');
                const photoEmpty = document.getElementById('photoEmpty');
                const photoGrid = document.getElementById('photoGrid');

                photoLoading.classList.add('hidden');

                const openPhotos = issues.filter(i => i.state === 'open');

                if (openPhotos.length === 0) {
                    photoEmpty.classList.remove('hidden');
                    photoGrid.classList.add('hidden');
                    return;
                }

                photoEmpty.classList.add('hidden');
                photoGrid.classList.remove('hidden');

                statsTotal.textContent = `${issues.length} 条留言 · ${openPhotos.length} 张照片`;

                photoGrid.innerHTML = openPhotos.map(issue => {
                    const note = issue.title.replace(/^📷\s*/, '');
                    const body = issue.body || '';
                    const dateMatch = body.match(/date:([^\n]+)/);
                    const imgB64 = body.match(/image:([^\n]+)/);
                    const timeStr = dateMatch ? formatAdminTime(dateMatch[1]) : formatAdminTime(issue.created_at);
                    return `
                        <div class="photo-card" data-issue="${issue.number}" data-b64="${imgB64 ? imgB64[1] : ''}">
                            <img src="${imgB64 ? 'data:image/jpeg;base64,' + imgB64[1] : ''}" alt="${escapeHtml(note)}" loading="lazy">
                            <button class="photo-del-btn" data-issue="${issue.number}" data-note="${escapeHtml(note)}">✕</button>
                            <div class="photo-card-info">
                                <div class="photo-card-title">${escapeHtml(note)}</div>
                                <div class="photo-card-time">${timeStr}</div>
                            </div>
                        </div>
                    `;
                }).join('');

                // Click to view detail
                photoGrid.querySelectorAll('.photo-card img').forEach(img => {
                    img.addEventListener('click', (e) => {
                        const card = e.currentTarget.closest('.photo-card');
                        const b64 = card.dataset.b64;
                        const note = card.querySelector('.photo-card-title').textContent;
                        const time = card.querySelector('.photo-card-time').textContent;
                        document.getElementById('photoDetailImg').src = card.querySelector('img').src;
                        document.getElementById('photoDetailNote').textContent = note;
                        document.getElementById('photoDetailTime').textContent = time;
                        document.getElementById('photoDetailOverlay').classList.add('show');
                    });
                });

                // Delete button
                photoGrid.querySelectorAll('.photo-del-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const issueNum = parseInt(btn.dataset.issue);
                        const note = btn.dataset.note;
                        pendingDeleteIssueNumber = issueNum;
                        pendingDeleteContent = note;
                        confirmDesc.textContent = `确定要删除这张照片吗？\n"${note}"`;
                        confirmOverlay.classList.add('show');
                        // Override the delete action for photos
                        pendingDeleteIsPhoto = true;
                    });
                });
            }

            let pendingDeleteIsPhoto = false;

            function formatAdminTime(iso) {
                if (!iso) return '';
                try {
                    const d = new Date(iso);
                    const m = String(d.getMonth()+1).padStart(2,'0');
                    const day = String(d.getDate()).padStart(2,'0');
                    const h = String(d.getHours()).padStart(2,'0');
                    const min = String(d.getMinutes()).padStart(2,'0');
                    return `${m}-${day} ${h}:${min}`;
                } catch(e) { return ''; }
            }

            // Photo detail overlay
            document.getElementById('photoDetailClose').addEventListener('click', () => {
                document.getElementById('photoDetailOverlay').classList.remove('show');
            });
            document.getElementById('photoDetailOverlay').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) {
                    document.getElementById('photoDetailOverlay').classList.remove('show');
                }
            });

            // ===== Refresh =====
            refreshBtn.addEventListener('click', () => {
                const activeTab = document.querySelector('.admin-tab.active');
                if (activeTab && activeTab.dataset.tab === 'photos') {
                    loadPhotos();
                } else {
                    loadAndRender();
                }
            });

            // ===== Focus password on load =====
            loginPassword.focus();
        })();

        (function(){
            var s=localStorage.getItem("theme");
            if(s==="dark"){document.body.classList.add("dark");createStars()}
            document.getElementById("themeLabel").textContent=s==="dark"?"深色":"浅色";
        })();
        document.getElementById("themeToggle").addEventListener("click",function(){
            document.body.classList.toggle("dark");
            var d=document.body.classList.contains("dark");
            localStorage.setItem("theme",d?"dark":"light");
            document.getElementById("themeLabel").textContent=d?"深色":"浅色";
            if(d)createStars();else removeStars();
        });
        var sc=null;
        function createStars(){if(sc)return;sc=document.createElement("div");sc.id="starContainer";sc.style.cssText="position:fixed;inset:0;z-index:0;pointer-events:none;";document.body.insertBefore(sc,document.body.firstChild);var f=document.createDocumentFragment();for(var i=0;i<120;i++){var st=document.createElement("div");var sz=Math.random()*2.5+1;st.style.cssText="position:absolute;width:"+sz+"px;height:"+sz+"px;background:#fff;border-radius:50%;left:"+Math.random()*100+"%;top:"+Math.random()*100+"%;opacity:"+(Math.random()*0.6+0.2)+";animation:starBlink "+(Math.random()*3+2)+"s ease-in-out "+(Math.random()*3)+"s infinite alternate;";f.appendChild(st)}sc.appendChild(f)}
        function removeStars(){if(sc){sc.remove();sc=null}}
        (function(){var s=document.createElement("style");s.textContent="@keyframes starBlink{0%{opacity:0.2;transform:scale(1)}100%{opacity:1;transform:scale(1.5)}}";document.head.appendChild(s)})();
    </script>
</body>
</html>
